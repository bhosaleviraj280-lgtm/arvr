<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Balance - Hand Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0f172a; font-family: 'Inter', sans-serif; }
        canvas { transform: scaleX(-1); width: 100vw; height: 100vh; display: block; }
        .ui { pointer-events: none; position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 2rem; z-index: 10; }
    </style>
</head>
<body>

    <div class="relative w-screen h-screen">
        <video id="input_video" class="hidden"></video>
        <canvas id="output_canvas"></canvas>
        
        <div class="ui">
            <div class="bg-black/30 backdrop-blur-xl px-8 py-4 rounded-2xl border border-white/10 text-center">
                <div class="text-blue-400 text-xs font-bold uppercase tracking-widest mb-1">Star Balance</div>
                <div id="score" class="text-4xl font-light text-white tracking-tighter">0</div>
            </div>
            
            <div id="status" class="bg-white/10 px-6 py-2 rounded-full text-white/60 text-xs uppercase tracking-widest border border-white/5">
                Wave your hand to begin
            </div>
        </div>

        <!-- Easy Start Overlay -->
        <div id="overlay" class="absolute inset-0 bg-slate-950 flex flex-col items-center justify-center z-50">
            <div class="text-center p-10">
                <div class="text-5xl mb-6">🌟</div>
                <h1 class="text-4xl font-bold text-white mb-4">Celestial Balance</h1>
                <p class="text-slate-400 mb-8 max-w-xs mx-auto text-lg">Move your hand side-to-side to catch the star. Keep it in the air!</p>
                <button id="start-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-12 py-4 rounded-xl font-bold transition-all transform active:scale-95 shadow-xl shadow-indigo-500/20">
                    Start Game
                </button>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const scoreElement = document.getElementById('score');
        const statusElement = document.getElementById('status');
        const overlay = document.getElementById('overlay');
        const startBtn = document.getElementById('start-btn');

        let score = 0;
        let paddle = { x: 0, width: 200, height: 20 };
        let star = { x: 0, y: 0, vx: 0, vy: 0, radius: 15 };
        let active = false;

        function resetStar() {
            star.x = canvasElement.width / 2;
            star.y = 100;
            star.vx = (Math.random() - 0.5) * 6;
            star.vy = 2;
        }

        function drawStar(x, y, radius) {
            canvasCtx.shadowBlur = 20;
            canvasCtx.shadowColor = '#fbbf24';
            canvasCtx.fillStyle = '#fbbf24';
            canvasCtx.beginPath();
            for (let i = 0; i < 5; i++) {
                canvasCtx.lineTo(Math.cos((18 + i * 72) / 180 * Math.PI) * radius + x,
                                 -Math.sin((18 + i * 72) / 180 * Math.PI) * radius + y);
                canvasCtx.lineTo(Math.cos((54 + i * 72) / 180 * Math.PI) * radius * 0.5 + x,
                                 -Math.sin((54 + i * 72) / 180 * Math.PI) * radius * 0.5 + y);
            }
            canvasCtx.closePath();
            canvasCtx.fill();
            canvasCtx.shadowBlur = 0;
        }

        function onResults(results) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Draw dimmed camera feed
            canvasCtx.globalAlpha = 0.3;
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.globalAlpha = 1.0;

            if (results.multiHandLandmarks && results.multiHandLandmarks[0]) {
                // Use the center of the palm (landmark 0 + 9 / 2) for smoother movement
                const palmBase = results.multiHandLandmarks[0][0];
                const middleBase = results.multiHandLandmarks[0][9];
                const avgX = (palmBase.x + middleBase.x) / 2;
                
                // Mirror mapping
                paddle.x = (1 - avgX) * canvasElement.width;
                statusElement.innerText = "Balancing...";
                
                // Draw Paddle (The "Hand Platform")
                canvasCtx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                canvasCtx.strokeStyle = '#6366f1';
                canvasCtx.lineWidth = 4;
                canvasCtx.lineCap = 'round';
                
                const pWidth = 180;
                const pY = canvasElement.height - 100;
                
                // Rounded bar
                canvasCtx.beginPath();
                canvasCtx.roundRect(paddle.x - pWidth/2, pY, pWidth, 15, 10);
                canvasCtx.fill();
                canvasCtx.stroke();

                if (active) {
                    // Star Physics
                    star.x += star.vx;
                    star.y += star.vy;
                    star.vy += 0.15; // Gravity

                    // Bounce off walls
                    if (star.x < 0 || star.x > canvasElement.width) star.vx *= -1;

                    // Bounce off paddle
                    if (star.y + star.radius > pY && 
                        star.y - star.radius < pY + 15 &&
                        star.x > paddle.x - pWidth/2 && 
                        star.x < paddle.x + pWidth/2) {
                        
                        star.vy = -10; // Bounce up
                        star.vx += (star.x - paddle.x) * 0.1; // Add direction based on where it hit
                        score++;
                        scoreElement.innerText = score;
                    }

                    // Fail state
                    if (star.y > canvasElement.height) {
                        score = 0;
                        scoreElement.innerText = score;
                        resetStar();
                    }

                    drawStar(star.x, star.y, star.radius);
                }
            } else {
                statusElement.innerText = "Place hand over camera to play";
            }

            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, // Lower complexity for faster performance on all devices
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 1280, height: 720
        });

        startBtn.addEventListener('click', () => {
            overlay.classList.add('opacity-0', 'pointer-events-none');
            camera.start();
            active = true;
            resetStar();
        });

    </script>
</body>
</html>
